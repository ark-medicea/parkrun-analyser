name: Update ParkRun Data

on:
  schedule:
    # 11:00 UTC = 12:00 BST on Saturdays
    - cron: '0 11 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper (discover + update)
        run: npm run scrape

      - name: Export DB to docs
        run: npm run db:export

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update parkrun data $(date +%Y-%m-%d)"
          git push
