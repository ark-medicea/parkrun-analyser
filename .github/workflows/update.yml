name: Update ParkRun Data

on:
  schedule:
    # 12:30 UTC = 13:30 BST on Saturdays
    - cron: '30 12 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper (discover + update)
        run: npm run scrape

      - name: Export DB to docs
        run: npm run db:export

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update parkrun data $(date +%Y-%m-%d)"
          git push

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.COPPER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 92.205.60.89 >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key data/parkrun.db ali@92.205.60.89:/home/ali/public_html/nomasti.enriched.solutions/parkrun.db
          scp -i ~/.ssh/deploy_key server/app.js server/api.php server/style.css server/index.html server/athlete.html server/athletes.html server/athlete-app.js ali@92.205.60.89:/home/ali/public_html/nomasti.enriched.solutions/
          rm -f ~/.ssh/deploy_key
